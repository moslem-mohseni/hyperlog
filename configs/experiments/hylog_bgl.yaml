# HyLog core experiment on BGL (roadmap §Phase 3).
# In-domain F1 target: >= Phase-2 LogLLM-on-BGL F1 - 1.0

defaults: []

run:
  name: hylog-bgl-qwen25-1.5b
  experiment: phase3-hylog-bgl
  seeds: [42, 1337, 2024, 31415, 27182]

model:
  decoder: qwen2.5-1.5b
  bert_path: bert-base-uncased
  max_content_len: 64
  max_sequence_lines: 128
  quantize_4bit: true
  projector:
    depth: 2
    dropout: 0.1
  head:
    dropout: 0.1
  lora:
    r: 16
    alpha: 32
    dropout: 0.05

data:
  dataset: bgl
  raw_dir: data/raw/bgl
  splits_path: splits/bgl.json

trainer:
  micro_batch_size: 4
  grad_accum_steps: 4
  class_weight_cap: 10.0
  compute_dtype: bfloat16

stages:
  - name: projector_warmup
    n_epochs: 1
    lr: 5.0e-4
    grad_clip_norm: 1.0
  - name: joint_qlora
    n_epochs: 2
    lr: 5.0e-5
    weight_decay: 0.01
    grad_clip_norm: 1.0
  - name: end_to_end_refine
    n_epochs: 1
    lr: 5.0e-6
    weight_decay: 0.01
    grad_clip_norm: 0.5

mlflow:
  experiment: phase3-hylog-bgl
  tracking_uri: file:./mlruns

vram_budget_gib: 22.0
