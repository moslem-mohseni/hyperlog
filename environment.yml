# Conda environment specification for HyLog.
#
# Two channels: conda-forge for the binary toolchain, pytorch for the
# CUDA-aware torch wheels. The python pin matches the lower bound in
# pyproject.toml (>= 3.11).
#
# Usage (Windows or Linux):
#   conda env create -f environment.yml
#   conda activate hylog
#   pip install -e ".[dev]"   # editable install of the project itself
#
# The pip side of the environment is intentionally minimal: torch is
# the only torch-stack member resolved by conda; everything else lands
# via pip so the lockfile (requirements-lock.txt) and pyproject.toml
# are the single source of dependency truth.

name: hylog
channels:
  - pytorch
  - nvidia
  - conda-forge

dependencies:
  - python>=3.11,<3.13
  - pip>=24.0
  - git>=2.40

  # Torch + CUDA — conda resolves the matched cudatoolkit.
  - pytorch=2.4.*
  - pytorch-cuda=12.1

  # Build toolchain (Linux).
  - gxx_linux-64
  - make

  # System libs commonly required by HuggingFace + bitsandbytes.
  - openssl
  - ca-certificates

  - pip:
      - "transformers>=4.45"
      - "peft>=0.12"
      - "bitsandbytes>=0.43.0; platform_system != 'Darwin'"
      - "accelerate>=0.34"
      - "datasets>=2.20"
      - "hydra-core>=1.3,<2.0"
      - "omegaconf>=2.3"
      - "mlflow>=2.16"
      - "scikit-learn>=1.5"
      - "numpy>=1.26"
      - "pandas>=2.2"
      - "scipy>=1.13"
      - "click>=8.1"
      - "fastapi>=0.115"
      - "uvicorn[standard]>=0.30"
      - "pydantic>=2.8"
      - "tqdm>=4.66"
      - "rich>=13.7"
      - "pyyaml>=6.0"
